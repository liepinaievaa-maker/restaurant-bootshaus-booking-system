<!DOCTYPE html>
<html>
<head>
    <style>
    img {
        height: 250px;
        object-fit: cover;
    }
</style>
    <title>Bootshaus</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Bootshaus</a>

        <div>
            <a class="btn btn-outline-light me-2" href="{% url 'create_booking' %}">Book</a>

            {% if user.is_authenticated %}
                <a class="btn btn-outline-light me-2" href="{% url 'my_bookings' %}">My Bookings</a>

                <form action="{% url 'logout' %}" method="POST" class="d-inline">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">Logout</button>
                </form>
            {% else %}
                <a class="btn btn-success" href="{% url 'login' %}">Login</a>
            {% endif %}
        </div>
    </div>
</nav>

    <hr>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

    <!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
