{% extends 'bookings/base.html' %}

{% block content %}
    <h1>My Bookings</h1>

    {% if bookings %}
        <ul>
            {% for booking in bookings %}
                <li>
                    {{ booking.booking_date }} at {{ booking.booking_time }} 
                    for {{ booking.guests }} guests
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>You have no bookings yet.</p>
    {% endif %}
{% endblock %}
