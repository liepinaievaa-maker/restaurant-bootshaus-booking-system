{% extends 'bookings/base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <h1 class="mb-4 text-center">Contact Us</h1>

        <p class="text-muted text-center">
            Have a question or special request? Send us a message below.
        </p>

        <form method="POST" class="card p-4 shadow">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Full Name</label>
                {{ form.full_name }}
                <div class="text-danger small">{{ form.full_name.errors }}</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
                <div class="text-danger small">{{ form.email.errors }}</div>
            </div>

            <div class="mb-3">
                <label class="form-label">Message</label>
                {{ form.message }}
                <div class="text-danger small">{{ form.message.errors }}</div>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Send Message
            </button>
        </form>

    </div>
</div>

{% endblock %}
